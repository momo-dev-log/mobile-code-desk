name: Deploy GitHub Pages

# GitHub Pagesの配信方式を「mainブランチ直配信」から「GitHub Actions配信」へ
# 移行するためのワークフロー。リポジトリ全体（root配信のサイト、feel-device/、
# feel-device-field/、notebooklm-packer/、web-disassembly-pack/ 等）を
# そのままstaging出力ディレクトリへコピーし、artifactとして配信する。
#
# feel-device-field/ のHUD用BUILD値とキャッシュ回避クエリ(?v=)だけ、staging
# 側のコピーの中だけで実際のGITHUB_SHAの短縮値に書き換える。リポジトリの
# ソースファイル自体（main.js, index.html）は書き換えない。

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build staging directory
        run: |
          STAGING_DIR="${RUNNER_TEMP}/pages-site"
          mkdir -p "$STAGING_DIR"
          rsync -a --exclude='.git' --exclude='.github' ./ "$STAGING_DIR"/
          echo "STAGING_DIR=$STAGING_DIR" >> "$GITHUB_ENV"

      - name: Inject build SHA into feel-device-field HUD (staging artifact only)
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          MAIN_JS="$STAGING_DIR/feel-device-field/js/main.js"
          INDEX_HTML="$STAGING_DIR/feel-device-field/index.html"
          sed -i "s/const BUILD = 'build:unbuilt';/const BUILD = 'build:${SHORT_SHA}';/" "$MAIN_JS"
          sed -i "s/shaders\.js?v=unbuilt/shaders.js?v=${SHORT_SHA}/" "$MAIN_JS"
          sed -i "s/main\.js?v=unbuilt/main.js?v=${SHORT_SHA}/" "$INDEX_HTML"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.STAGING_DIR }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
