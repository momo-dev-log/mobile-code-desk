name: Deploy GitHub Pages

# GitHub Pagesの配信方式を「mainブランチ直配信」から「GitHub Actions配信」へ
# 移行するためのワークフロー。リポジトリ全体（root配信のサイト、feel-device/、
# feel-device-field/、notebooklm-packer/、web-disassembly-pack/ 等）を
# そのままstaging出力ディレクトリへコピーし、artifactとして配信する。
#
# feel-device-field/ と feel-device-field-scalar-gate/ のHUD用BUILD値と
# キャッシュ回避クエリ(?v=)だけ、staging側のコピーの中だけで実際の
# GITHUB_SHAの短縮値に書き換える。リポジトリのソースファイル自体
# （main.js, index.html）は書き換えない。

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    # workflow_dispatchはUIで任意のブランチ/タグを選んで実行できるため、
    # push トリガーの branches 指定だけでは防げない。mainのref以外から
    # 実行された場合はbuildそのものをskipし、本番への誤デプロイを防ぐ。
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build staging directory
        run: |
          STAGING_DIR="${RUNNER_TEMP}/pages-site"
          mkdir -p "$STAGING_DIR"
          rsync -a --exclude='.git' --exclude='.github' ./ "$STAGING_DIR"/
          echo "STAGING_DIR=$STAGING_DIR" >> "$GITHUB_ENV"

      - name: Inject build SHA into feel-device-field HUD (staging artifact only)
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          MAIN_JS="$STAGING_DIR/feel-device-field/js/main.js"
          INDEX_HTML="$STAGING_DIR/feel-device-field/index.html"
          sed -i "s/const BUILD = 'build:unbuilt';/const BUILD = 'build:${SHORT_SHA}';/" "$MAIN_JS"
          sed -i "s/shaders\.js?v=unbuilt/shaders.js?v=${SHORT_SHA}/" "$MAIN_JS"
          sed -i "s/main\.js?v=unbuilt/main.js?v=${SHORT_SHA}/" "$INDEX_HTML"

      - name: Inject build SHA into feel-device-field-scalar-gate HUD (staging artifact only)
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          MAIN_JS="$STAGING_DIR/feel-device-field-scalar-gate/js/main.js"
          INDEX_HTML="$STAGING_DIR/feel-device-field-scalar-gate/index.html"
          sed -i "s/const BUILD = 'build:unbuilt';/const BUILD = 'build:${SHORT_SHA}';/" "$MAIN_JS"
          sed -i "s/shaders\.js?v=unbuilt/shaders.js?v=${SHORT_SHA}/" "$MAIN_JS"
          sed -i "s/main\.js?v=unbuilt/main.js?v=${SHORT_SHA}/" "$INDEX_HTML"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ${{ env.STAGING_DIR }}

  deploy:
    needs: build
    # buildジョブと同じ理由でmain以外からの実行をskipする。buildがskipされた
    # 場合はneeds経由で自動的にskipされるが、deploy単独で見ても明示するため
    # 同じガードを重ねて書いている。
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
