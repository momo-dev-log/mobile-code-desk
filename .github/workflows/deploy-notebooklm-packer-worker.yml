name: Deploy notebooklm-packer Worker (v2)

on:
  push:
    branches:
      - claude/notebookml-resource-pack-feasibility-aPfjF
    paths:
      - 'notebooklm-packer/worker/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: notebooklm-packer/worker
          command: deploy
