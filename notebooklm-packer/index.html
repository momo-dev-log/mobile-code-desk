<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NotebookLM 資料化ツール</title>
  <link rel="stylesheet" href="style.css?v=phase5">
</head>
<body>

  <header class="app-header">
    <h1>📄 NotebookLM 資料化ツール</h1>
    <p class="app-subtitle">Phase 5 — コピー・保存</p>
  </header>

  <main class="app-main">

    <!-- URL 入力エリア -->
    <section class="card input-card">
      <label class="input-label" for="url-input">取得するページの URL</label>
      <input
        type="url"
        id="url-input"
        class="url-input"
        placeholder="https://example.com/article"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
      >
      <button id="fetch-btn" class="fetch-btn">取得する</button>
    </section>

    <!-- ステータス表示 -->
    <div id="status-bar" class="status-bar" hidden>
      <span id="status-icon"></span>
      <span id="status-text"></span>
    </div>

    <!-- 取得結果エリア -->
    <section id="result-card" class="card result-card" hidden>

      <!-- タブ切り替えバー -->
      <div class="tab-bar">
        <button class="tab-btn tab-active" id="tab-html">HTML ソース</button>
        <button class="tab-btn" id="tab-text">抽出本文</button>
        <button class="tab-btn" id="tab-markdown">Markdown</button>
        <span id="char-count" class="char-count"></span>
      </div>

      <!-- HTML ソースパネル -->
      <div id="panel-html">
        <textarea
          id="result-html"
          class="result-area result-area-mono"
          readonly
          placeholder="ここに取得した HTML が表示されます"
        ></textarea>
      </div>

      <!-- 抽出本文パネル -->
      <div id="panel-text" hidden>
        <div id="extract-meta" class="extract-meta"></div>
        <textarea
          id="result-text"
          class="result-area result-area-prose"
          readonly
          placeholder="本文を抽出中..."
        ></textarea>
      </div>

      <!-- Markdown パネル -->
      <div id="panel-markdown" hidden>
        <!-- アクションバー：コピー・ダウンロード -->
        <div class="action-bar">
          <button id="copy-markdown-btn" class="action-btn">📋 コピー</button>
          <button id="download-txt-btn"  class="action-btn">💾 .txt</button>
          <button id="download-md-btn"   class="action-btn">📥 .md</button>
          <span id="copy-feedback" class="copy-feedback" hidden></span>
        </div>
        <textarea
          id="result-markdown"
          class="result-area result-area-markdown"
          readonly
          placeholder="Markdown に変換中..."
        ></textarea>
      </div>

      <p class="result-note" id="result-note"></p>
    </section>

  </main>

  <script src="app.js?v=phase5"></script>
</body>
</html>
