<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>notebooklm-packer (Phase 3)</title>
  <link rel="stylesheet" href="style.css?v=phase3b">
</head>
<body>
  <header class="app-header">
    <h1>notebooklm-packer</h1>
    <p class="app-subtitle">Phase 3 — さがす・候補・仕上げ</p>
  </header>

  <main>
    <!-- さがすタブ -->
    <section id="tab-search" class="tab-panel" data-tab="search">
      <div class="search-bar">
        <label for="search-input" class="visually-hidden">キーワード</label>
        <input type="text" id="search-input" placeholder="キーワード（スペース区切りで複数指定）">
        <button type="button" id="search-btn" class="btn btn-primary">探す</button>
      </div>

      <div class="url-fold-section">
        <button type="button" id="url-fold-toggle" class="url-fold-toggle">
          <span id="url-fold-arrow">▸</span> 取り込み済みURL <span id="url-fold-count">0</span>件
        </button>
        <div id="url-fold-body" class="url-fold-body" hidden>
          <ul id="url-list" class="url-list"></ul>

          <label for="url-textarea">URLを貼り付け</label>
          <textarea id="url-textarea" rows="3" placeholder="https://example.com/article&#10;（複数可・改行区切り。サイトのトップURLやsitemap.xmlのURLも可）"></textarea>
          <button type="button" id="import-btn" class="btn btn-primary">URLを取り込む</button>
          <p id="import-status" class="status-text"></p>

          <div id="import-confirm" class="import-confirm" hidden>
            <p id="import-confirm-text"></p>
            <button type="button" id="import-confirm-fetch-btn" class="btn btn-primary">本文を取得する</button>
          </div>

          <div id="sitemap-section" class="sitemap-section" hidden>
            <p id="sitemap-status" class="status-text"></p>

            <div id="sitemap-index-list" class="sitemap-index-list" hidden></div>

            <div id="sitemap-url-list-section" class="sitemap-url-list-section" hidden>
              <div class="sitemap-url-actions">
                <button type="button" id="sitemap-select-all-btn" class="btn btn-small">全選択</button>
                <button type="button" id="sitemap-deselect-all-btn" class="btn btn-small">全解除</button>
              </div>
              <ul id="sitemap-url-list" class="sitemap-url-list"></ul>
              <button type="button" id="sitemap-import-btn" class="btn btn-primary">URLを取り込む</button>
            </div>
          </div>
        </div>
      </div>

      <div id="article-card-list"></div>
    </section>

    <!-- 候補タブ -->
    <section id="tab-pack" class="tab-panel" data-tab="pack" hidden>
      <h2>候補</h2>
      <p id="pack-count" class="pack-count"></p>
      <p id="pack-warn" class="pack-warn" hidden></p>
      <ul id="pack-list" class="pack-list"></ul>
      <button type="button" id="finish-btn" class="btn btn-primary">仕上げへ進む</button>
    </section>

    <!-- 仕上げタブ -->
    <section id="tab-finish" class="tab-panel" data-tab="finish" hidden>
      <h2>仕上げ</h2>
      <label for="pack-name-input">パック名</label>
      <input type="text" id="pack-name-input" value="資料パック">
      <label class="checkbox-label">
        <input type="checkbox" id="txt-checkbox">
        テキスト版（.txt）も一緒に作る
      </label>
      <button type="button" id="build-btn" class="btn btn-primary">パックのファイルを作る</button>
      <button type="button" id="save-btn" class="btn btn-primary" hidden>ファイルを保存</button>
      <p id="build-status" class="status-text"></p>
      <p class="finish-note">保存後、NotebookLMへはご自身でアップロードしてください</p>
      <p class="finish-note">iPhoneでは長期間使わないと保存データが消えることがあります。ホーム画面に追加すると防げます</p>
    </section>
  </main>

  <nav class="tab-bar">
    <button type="button" class="tab-btn tab-btn--active" data-tab="search">さがす</button>
    <button type="button" class="tab-btn" data-tab="pack">候補<span id="tab-pack-badge" class="tab-badge" hidden></span></button>
    <button type="button" class="tab-btn" data-tab="finish">仕上げ</button>
  </nav>

  <script type="module" src="js/main.js?v=phase3b"></script>
</body>
</html>
