<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>notebooklm-packer</title>
  <link rel="stylesheet" href="style.css?v=2tab">
</head>
<body>
  <header class="app-header">
    <h1>notebooklm-packer</h1>
    <p class="app-subtitle">記事・カテゴリ</p>
  </header>

  <main>
    <!-- 記事タブ -->
    <section id="tab-articles" class="tab-panel" data-tab="articles">
      <div id="articles-toolbar" class="articles-toolbar">
        <section class="url-input-section">
          <label for="url-textarea">URLを貼り付けて取り込む</label>
          <textarea id="url-textarea" rows="3" placeholder="https://example.com/article&#10;（複数可・改行区切り）"></textarea>
          <button type="button" id="import-btn" class="btn btn-primary">URLを取り込む</button>
          <p id="import-status" class="status-text"></p>
        </section>

        <div class="url-fold-section">
          <button type="button" id="url-fold-toggle" class="url-fold-toggle">
            <span id="url-fold-arrow">▾</span> 取り込み済みURL <span id="url-fold-count">0</span>件
          </button>
          <div id="url-fold-body" class="url-fold-body">
            <ul id="url-list" class="url-list"></ul>
          </div>
        </div>

        <section id="failed-area" class="failed-area" hidden>
          <h2>取得失敗 <span id="failed-count">0</span>件</h2>
          <ul id="failed-list" class="failed-list"></ul>
        </section>

        <div id="category-bar-wrap" class="category-bar-wrap">
          <div id="category-bar" class="category-bar"></div>
          <p id="category-bar-status" class="status-text"></p>
        </div>
      </div>

      <div id="articles-scroll" class="articles-scroll">
        <div id="article-card-list"></div>
      </div>
    </section>

    <!-- カテゴリタブ -->
    <section id="tab-categories" class="tab-panel" data-tab="categories" hidden>
      <!-- カテゴリ一覧ビュー -->
      <div id="category-list-view">
        <h2>カテゴリごとに資料を作る</h2>

        <p id="category-status" class="status-text"></p>

        <p id="category-empty-note" class="empty-note">資料化できるカテゴリはまだありません。</p>
        <ul id="category-list" class="category-list"></ul>
      </div>

      <!-- カテゴリ詳細ビュー -->
      <div id="category-detail-view" hidden>
        <h2 id="category-detail-title"></h2>
        <button type="button" id="category-detail-export-btn" class="btn btn-primary">Markdownファイルを書き出す</button>
        <p id="category-detail-export-status" class="status-text"></p>
        <p id="category-detail-empty" class="empty-note" hidden>このカテゴリにはまだ記事がありません</p>
        <ul id="category-detail-list" class="category-detail-list"></ul>
      </div>
      <button type="button" id="category-detail-back-btn" class="btn-back-link" hidden>← 一覧に戻る</button>
    </section>
  </main>

  <nav class="tab-bar">
    <button type="button" class="tab-btn tab-btn--active" data-tab="articles">記事</button>
    <button type="button" class="tab-btn" data-tab="categories">資料化</button>
  </nav>

  <!-- カテゴリ付けシート -->
  <div id="category-sheet-overlay" class="category-sheet-overlay" hidden></div>
  <div id="category-sheet" class="category-sheet" hidden>
    <h2>カテゴリを選択</h2>
    <ul id="category-sheet-list" class="category-sheet-list"></ul>

    <div class="category-sheet-new">
      <label for="category-sheet-new-input">＋ 新しいカテゴリを作る</label>
      <input type="text" id="category-sheet-new-input" placeholder="作成後、この記事を入れます">
      <button type="button" id="category-sheet-create-btn" class="btn btn-primary">作成して入れる</button>
    </div>

    <p id="category-sheet-status" class="status-text"></p>
    <button type="button" id="category-sheet-close-btn" class="btn">閉じる</button>
  </div>

  <script type="module" src="js/main.js?v=2tab"></script>
</body>
</html>
