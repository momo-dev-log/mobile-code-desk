<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mobile Code Desk</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── Header ── -->
  <header id="header">
    <button id="btn-project-menu" aria-label="プロジェクト一覧">&#9776;</button>
    <span id="project-title">プロジェクトなし</span>
    <span id="save-status" class="save-status saved">保存済</span>
    <button id="btn-save" class="btn-accent">保存</button>
  </header>

  <!-- ── Tab Bar ── -->
  <nav id="tab-bar">
    <button class="tab active" data-tab="html">
      <span class="tab-ja">画面</span>
      <span class="tab-en">HTML</span>
    </button>
    <button class="tab" data-tab="css">
      <span class="tab-ja">見た目</span>
      <span class="tab-en">CSS</span>
    </button>
    <button class="tab" data-tab="js">
      <span class="tab-ja">動き</span>
      <span class="tab-en">JS</span>
    </button>
    <button class="tab" data-tab="preview">ためす</button>
  </nav>

  <!-- ── Main Area ── -->
  <main id="main-area">
    <!-- HTML Pane -->
    <div id="pane-html" class="pane active">
      <div class="pane-toolbar">
        <span class="pane-label">画面の中身（HTML）</span>
        <button class="btn-copy" data-target="html">コピー</button>
      </div>
      <textarea id="editor-html"
        spellcheck="false" autocorrect="off" autocapitalize="off" autocomplete="off"
        placeholder="画面の構造（HTML）を書く..."></textarea>
    </div>

    <!-- CSS Pane -->
    <div id="pane-css" class="pane">
      <div class="pane-toolbar">
        <span class="pane-label">見た目（CSS）</span>
        <button class="btn-copy" data-target="css">コピー</button>
      </div>
      <textarea id="editor-css"
        spellcheck="false" autocorrect="off" autocapitalize="off" autocomplete="off"
        placeholder="見た目（CSS）を書く..."></textarea>
    </div>

    <!-- JS Pane -->
    <div id="pane-js" class="pane">
      <div class="pane-toolbar">
        <span class="pane-label">動き（JavaScript）</span>
        <button class="btn-copy" data-target="js">コピー</button>
      </div>
      <textarea id="editor-js"
        spellcheck="false" autocorrect="off" autocapitalize="off" autocomplete="off"
        placeholder="動き（JavaScript）を書く..."></textarea>
    </div>

    <!-- Preview Pane -->
    <div id="pane-preview" class="pane">
      <div class="pane-toolbar">
        <span class="pane-label">ためしに動かす</span>
        <div class="toolbar-actions">
          <button id="btn-fullscreen-preview">全画面</button>
          <button id="btn-refresh-preview">&#8635; 画面を作り直す</button>
        </div>
      </div>
      <iframe id="preview-frame" sandbox="allow-scripts allow-same-origin" title="プレビュー"></iframe>
    </div>

    <!-- ── No Project Guard ── -->
    <div id="no-project-guard" class="no-project-guard hidden">
      <p class="guard-message">作業するプロジェクトが選ばれていません</p>
      <button id="btn-guard-create" class="btn-primary guard-btn">＋ 新規プロジェクトを作成</button>
      <button id="btn-guard-list" class="btn-secondary guard-btn">プロジェクト一覧を開く</button>
    </div>
  </main>

  <!-- ── Action Bar ── -->
  <footer id="action-bar">
    <button id="btn-export">書き出す（JSON）</button>
    <label class="action-label">読み込む（JSON）
      <input type="file" id="import-file" accept=".json">
    </label>
    <button id="btn-single-html">1ファイルHTMLにまとめる</button>
  </footer>

  <!-- ── Modal: Project List ── -->
  <div id="modal-projects" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-sheet">
      <div class="modal-header">
        <h2>プロジェクト</h2>
        <button class="btn-close" data-modal="modal-projects" aria-label="閉じる">✕</button>
      </div>
      <div class="modal-body">
        <button id="btn-open-new-project" class="btn-primary btn-full">＋ 新規プロジェクト</button>
        <ul id="project-list" class="project-list"></ul>
      </div>
    </div>
  </div>

  <!-- ── Modal: New Project ── -->
  <div id="modal-new-project" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-sheet">
      <div class="modal-header">
        <h2>新規プロジェクト</h2>
        <button class="btn-close" data-modal="modal-new-project" aria-label="閉じる">✕</button>
      </div>
      <div class="modal-body">
        <input type="text" id="new-project-input" class="text-input" placeholder="プロジェクト名">
        <div class="modal-actions">
          <button id="btn-create-project" class="btn-primary">作成</button>
          <button class="btn-close btn-secondary" data-modal="modal-new-project">キャンセル</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Modal: Rename ── -->
  <div id="modal-rename" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-sheet">
      <div class="modal-header">
        <h2>名前を変更</h2>
        <button class="btn-close" data-modal="modal-rename" aria-label="閉じる">✕</button>
      </div>
      <div class="modal-body">
        <input type="text" id="rename-input" class="text-input" placeholder="プロジェクト名">
        <div class="modal-actions">
          <button id="btn-rename-ok" class="btn-primary">変更</button>
          <button class="btn-close btn-secondary" data-modal="modal-rename">キャンセル</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Modal: Copy Fallback ── -->
  <div id="modal-copy-fallback" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-sheet">
      <div class="modal-header">
        <h2>コードをコピー</h2>
        <button class="btn-close" data-modal="modal-copy-fallback" aria-label="閉じる">✕</button>
      </div>
      <div class="modal-body">
        <p class="modal-note">自動コピーに失敗しました。以下を全選択してコピーしてください。</p>
        <textarea id="copy-fallback-textarea" readonly class="code-textarea"></textarea>
        <button id="btn-select-all-fallback" class="btn-secondary btn-full">全選択</button>
      </div>
    </div>
  </div>

  <!-- ── Modal: Single HTML ── -->
  <div id="modal-single-html" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-sheet">
      <div class="modal-header">
        <h2>1ファイルHTMLにまとめる</h2>
        <button class="btn-close" data-modal="modal-single-html" aria-label="閉じる">✕</button>
      </div>
      <div class="modal-body">
        <textarea id="single-html-textarea" readonly class="code-textarea"></textarea>
        <div class="modal-actions">
          <button id="btn-copy-single-html" class="btn-primary">コピー</button>
          <button id="btn-download-single-html" class="btn-secondary">ダウンロード</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Modal: Confirm ── -->
  <div id="modal-confirm" class="modal modal-centered hidden" role="dialog" aria-modal="true">
    <div class="modal-sheet modal-dialog">
      <div class="modal-header">
        <h2>確認</h2>
      </div>
      <div class="modal-body">
        <p id="confirm-message" class="confirm-text"></p>
        <div class="modal-actions">
          <button id="btn-confirm-ok" class="btn-danger">OK</button>
          <button id="btn-confirm-cancel" class="btn-secondary">キャンセル</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Toast ── -->
  <div id="toast" class="toast" aria-live="polite"></div>

  <script src="app.js"></script>
</body>
</html>
