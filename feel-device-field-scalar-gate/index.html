<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <!-- スマホ縦持ち前提。ピンチズーム/ダブルタップズームを抑止 -->
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>感触装置 scalar gate検証(独立ページ)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;          /* スクロールさせない */
      background: #1a1a1a;
      overscroll-behavior: none; /* 引っ張りリロード等を抑止 */
    }
    #gl {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none; /* 指の操作をすべて描画に使う（スクロール/ズームに奪われない） */
    }
  </style>
  <!-- Erudaはスマホ実機でWebGL黒画面の原因を画面上で確認するためのデバッグ用。
       検証専用ページなので、確認が終わったら外す想定。 -->
  <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
  <script>eruda.init();</script>
  <!-- three.js本体とGPUComputationRendererアドオンはCDNから読み込む（ビルド不要）。
       GPUComputationRenderer.js内部は bare specifier 'three' をimportするため、
       import mapで解決先を指定する。 -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <canvas id="gl"></canvas>
  <!-- バージョンHUD: Erudaを開かなくても画面上で反映状況(BUILD/WebGL版/linear状態)を
       確認できるようにする。右下はErudaボタンと被るため左下に置く。 -->
  <div id="hud" style="position:fixed;left:8px;bottom:8px;z-index:9999;
    font:12px monospace;color:#aaa;background:rgba(0,0,0,0.4);
    padding:2px 6px;border-radius:4px;pointer-events:none;"></div>
  <!-- スマホ側でjsが古いままキャッシュされる問題への対策。
       ?v=unbuilt は .github/workflows/deploy-pages.yml がstaging artifact内
       だけでGITHUB_SHAの短縮値に書き換える置き換え対象。手で書き換えない。 -->
  <script type="module" src="js/main.js?v=unbuilt"></script>
</body>
</html>
